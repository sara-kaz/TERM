# Maximum CALVIN embodied training (continuous 7-DoF, ~3–5 days GPU).
# Saves best checkpoint by lowest val regression MSE (not classification acc).

model:
  num_actions:    14
  history_len:    4
  num_vis_frames: 3
  fusion_layers:  6
  fusion_heads:   8
  d_model:        256
  d_ff_scale:     4
  dropout:        0.1
  freeze_clip:    true
  unfreeze_clip_vision: true
  action_dim:     7
  proprio_dim:    15

vera:
  use_lang_feedback:      true
  use_temporal_history:   true
  use_reward_gate:        true
  use_consequence_token:  true
  alignment_loss_coef:    0.02
  regression_loss_coef:   3.0

data:
  dataset_type:     calvin
  calvin_split:     training
  img_size:         224
  use_gripper_cam:  true
  proprio_stats_path: data/calvin_proprio_stats.json

training:
  finetune:                 true
  device:                   auto
  epochs:                   80
  seed:                     123
  early_stopping_patience:  15
  checkpoint_metric:        val_reg
  closed_loop_dropout:      0.35
  batch_size:               32
  lr:                       2e-5
  lr_min:                   5e-7
  weight_decay:             1e-4
  label_smoothing:          0.05
  grad_clip:                1.0
  val_fraction:             0.2
  num_workers:              6
  log_every_batches:        200
  save_every:               10
  output_dir:               checkpoints/calvin_max/seed123/

warmstart: checkpoints/calvin_sim_vera/seed123/best_sft_vera.pt
